<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>연세 이메일 인증</title>

  <!-- ✅ Firebase SDK: gstatic에서 직접 로드 -->
  <script src="https://www.gstatic.com/firebasejs/12.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/12.8.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/12.8.0/firebase-firestore-compat.js"></script>

  <!-- ✅ Hosting이 자동 주입하는 init (firebase.initializeApp 포함) -->
  <script src="/__/firebase/init.js"></script>

  <style>
    body { font-family:-apple-system,BlinkMacSystemFont,sans-serif; background:#f5f6f8; margin:0; }
    .container { max-width:420px; margin:120px auto; background:#fff; padding:32px; border-radius:12px;
      box-shadow:0 4px 20px rgba(0,0,0,.08); text-align:center; }
    h1 { font-size:20px; margin:0 0 16px; }
    p { font-size:14px; color:#555; line-height:1.6; margin:0; }
    .success { color:#2e7d32; font-weight:600; }
    .error { color:#c62828; font-weight:600; }
    .muted { color:#888; font-size:12px; margin-top:10px; }
    code { background:#f1f3f5; padding:2px 6px; border-radius:6px; }
  </style>
</head>

<body>
  <div class="container">
    <h1>학생 인증 처리 중입니다…</h1>
    <p id="status">잠시만 기다려 주세요.</p>
    <p class="muted" id="debug"></p>
  </div>

  <script>
    (async () => {
      // 중복 실행 방지
      if (window.__EMAIL_LINK_RUNNING__) return;
      window.__EMAIL_LINK_RUNNING__ = true;

      const statusEl = document.getElementById('status');
      const debugEl = document.getElementById('debug');

      const setStatus = (html) => { statusEl.innerHTML = html; };
      const setDebug = (html) => { if (debugEl) debugEl.innerHTML = html; };

      // firebase 객체 준비 대기
      const waitFirebase = async (timeoutMs = 12000) => {
        const start = Date.now();
        while (Date.now() - start < timeoutMs) {
          if (window.firebase && firebase.apps && firebase.apps.length >= 0 && firebase.auth && firebase.firestore) {
            // init.js가 실행되어 initializeApp까지 끝났는지 체크
            try {
              firebase.app();
              return true;
            } catch (_) {
              // 아직 initializeApp 안 됐을 수 있음
            }
          }
          await new Promise(r => setTimeout(r, 80));
        }
        return false;
      };

      // ✅ t 추출: 1) 현재 URL 쿼리스트링 2) continueUrl 파라미터 내부
      function extractTokenFromUrl(href) {
        try {
          const u = new URL(href);
          // 1) 직접 t=...
          let t = u.searchParams.get('t');
          if (t) return t;

          // 2) continueUrl 내부에 t가 들어있는 케이스
          // 예: ...&continueUrl=https%3A%2F%2Fseolleyeon.web.app%2Fauth%2Femail-link%3Ft%3Dxxxx
          const cont = u.searchParams.get('continueUrl');
          if (cont) {
            const decoded = decodeURIComponent(cont);
            const cu = new URL(decoded);
            t = cu.searchParams.get('t');
            if (t) return t;
          }

          // 3) 혹시 query 전체가 encode된 특이케이스 대비
          // (마지막 보험)
          const m = href.match(/[?&]t=([^&]+)/);
          if (m && m[1]) return decodeURIComponent(m[1]);
        } catch (e) {}
        return null;
      }

      // ✅ firebase email-link URL은 현재 location.href가 아니라 "원본 링크"를 써야 함
      // 보통은 location.href 그대로 OK. 다만 일부 인앱 브라우저에서 fragment/param 변형이 있음.
      const rawUrl = window.location.href;
      let stage = 'init';

      try {
        stage = 'firebase_wait';
        setStatus('⏳ Firebase 준비 중…');
        const ok = await waitFirebase();
        if (!ok) {
          throw new Error('Firebase SDK/init 로드 실패. (Hosting init.js 또는 네트워크 문제)');
        }

        const auth = firebase.auth();
        const db = firebase.firestore();

        // token 추출
        stage = 'extract_token';
        const token = extractTokenFromUrl(rawUrl);
        setDebug(`URL: <code>${rawUrl.replace(/</g, '&lt;')}</code><br/>t: <code>${token || 'null'}</code>`);

        stage = 'check_link';
        setStatus('⏳ 링크 확인 중…');

        // Firebase email link인지 확인
        if (!auth.isSignInWithEmailLink(rawUrl)) {
          throw new Error('유효하지 않은 인증 링크입니다. (Firebase 이메일 링크 아님)');
        }

        if (!token) {
          throw new Error('토큰(t)을 찾을 수 없습니다. 앱에서 다시 인증 링크를 보내주세요.');
        }

        stage = 'read_token_doc';
        setStatus('⏳ 토큰 조회 중…');

        const tokenRef = db.collection('emailLinkTokens').doc(token);
        const tokenSnap = await tokenRef.get();

        if (!tokenSnap.exists) {
          throw new Error('토큰 문서가 없습니다. (만료/삭제/권한 문제 가능)');
        }

        const data = tokenSnap.data() || {};
        const email = data.email;
        const kakaoUserId = data.kakaoUserId;
        const expiresAt = data.expiresAt;

        if (!email || !kakaoUserId) {
          throw new Error('토큰 데이터(email/kakaoUserId)가 올바르지 않습니다.');
        }

        // 만료 체크 (있으면)
        if (expiresAt && typeof expiresAt.toDate === 'function') {
          const exp = expiresAt.toDate();
          if (Date.now() > exp.getTime()) {
            // 만료면 토큰 삭제 시도 후 종료
            try { await tokenRef.delete(); } catch (_) {}
            throw new Error('토큰이 만료되었습니다. 앱에서 다시 인증 링크를 보내주세요.');
          }
        }

        stage = 'sign_in_with_email_link';
        setStatus('⏳ 이메일 인증 처리 중…');

        // 재진입/중복 클릭 대비:
        // 이미 로그인된 세션이 있으면 signIn 단계를 스킵한다.
        let user = auth.currentUser;
        if (!user) {
          try {
            // 이메일 링크 로그인
            // - signIn은 토큰 문서에 저장된 email로 수행
            const result = await auth.signInWithEmailLink(String(email).trim(), rawUrl);
            user = result && result.user ? result.user : null;
          } catch (err) {
            // 링크가 이미 사용/만료된 경우에도, 세션이 이미 로그인돼 있으면 진행 가능
            user = auth.currentUser;
            const code = err && err.code ? String(err.code) : '';
            if (!user || code !== 'auth/invalid-action-code') throw err;
          }
        }

        if (!user) {
          throw new Error('인증 실패(user 없음).');
        }

        stage = 'write_user_verified';
        setStatus('⏳ 학생 인증 저장 중…');

        const authedEmail = String(user.email || '').trim().toLowerCase();
        if (!authedEmail) {
          throw new Error('인증된 이메일 정보를 가져오지 못했습니다.');
        }

        // 학생 인증 완료 표시
        await db.collection('users').doc(String(kakaoUserId)).set({
          kakaoUserId: String(kakaoUserId),
          isStudentVerified: true,
          studentEmail: authedEmail,
          verifiedAt: firebase.firestore.FieldValue.serverTimestamp(),
        }, { merge: true });

        // 토큰 재사용 방지 삭제
        stage = 'delete_token';
        try { await tokenRef.delete(); } catch (_) {}

        setStatus(
          '<span class="success">🎉 인증이 완료되었습니다!<br/>앱으로 돌아가서 다음을 진행해 주세요.</span>'
        );

      } catch (e) {
        console.error(e);
        const msg = (e && e.message) ? e.message : String(e);
        const code = (e && e.code) ? String(e.code) : '';

        setStatus(
          '<span class="error">인증 중 오류: ' + msg +
          (code ? ' <br/><span class="muted">code: ' + code + '</span>' : '') +
          '<br/><span class="muted">stage: ' + stage + '</span>' +
          '<br/>앱에서 다시 시도해 주세요.</span>'
        );
      }
    })();
  </script>
</body>
</html>
